version: 1

runtime:
  timezone: Asia/Shanghai
  request_timeout_seconds: 30
  retry_count: 3
  random_delay_seconds: 10
  log_level: info
  logging:
    enabled: true
    directory: logs
    file_prefix: mihoyo-bbs-tools.log

captcha:
  endpoint: null

accounts:
  - name: "账号一"
    remark: null
    enabled: true
    credentials:
      # 完整 Cookie 中需包含 stoken；程序会自动提取，无需单独填写。
      cookie: "${MIHOYO_COOKIE_1}"
      stoken: ""
    device:
      name: "Xiaomi MI 6"
      model: "Mi 6"
      id: ""
      fp: ""
    proxy:
      url: null
    tasks:
      china_game_checkin: true
      hoyolab_checkin: false
      bbs:
        enabled: true
        sign: true
        read: false
        like: false
        cancel_like: false
        share: false
      china_cloud_game: false
      overseas_cloud_game: false
      web_activity: false
    games:
      - genshin

  # 添加更多账号时复制完整账号块。保持注释可避免未设置的环境变量影响校验。
  # - name: "账号二"
