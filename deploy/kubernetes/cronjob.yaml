apiVersion: batch/v1
kind: CronJob
metadata:
  name: mihoyo-bbs-tools-rs
  labels:
    app.kubernetes.io/name: mihoyo-bbs-tools-rs
    app.kubernetes.io/part-of: mihoyo-bbs-tools-rs
spec:
  schedule: "5 0 * * *"
  timeZone: Asia/Shanghai
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: mihoyo-bbs-tools-rs
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mihoyo-bbs-tools-rs
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: mihoyo-bbs-tools-rs
              image: ghcr.io/bcmdy/mihoyo-bbs-tools-rs:latest
              imagePullPolicy: Always
              args:
                - run
                - --config
                - /app/config/config.yaml
                - --read-only
              env:
                - name: TZ
                  value: Asia/Shanghai
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 250m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: config
                  mountPath: /app/config
                  readOnly: true
                - name: logs
                  mountPath: /app/logs
          volumes:
            - name: config
              secret:
                secretName: mihoyo-bbs-tools-config
                defaultMode: 0440
                items:
                  - key: config.yaml
                    path: config.yaml
            - name: logs
              emptyDir: {}
