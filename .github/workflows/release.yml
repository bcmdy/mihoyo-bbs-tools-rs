name: 发布

on:
  workflow_dispatch:
    inputs:
      version:
        description: 要构建和发布的版本号，例如 1.0.1（对应标签 v1.0.1）
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-linux:
    name: 构建 Linux x86_64
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 确定构建版本
        id: version
        shell: bash
        env:
          RAW_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          raw_version="$RAW_VERSION"
          version="${raw_version#v}"
          if [[ ! "$version" =~ ^[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "版本号只能包含字母、数字、点、下划线和连字符" >&2
            exit 1
          fi
          echo "MIHOYO_BBS_TOOLS_VERSION=$version" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=MihoyoBBSToolsRS-$version-linux-x86_64" >> "$GITHUB_ENV"
          echo "package_name=MihoyoBBSToolsRS-$version-linux-x86_64" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: 检出手动指定的版本标签
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
          git checkout --detach "$TAG"

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: 编译 Release
        run: cargo build --release --locked

      - name: 打包并生成校验文件
        run: |
          set -euo pipefail
          package_name="$PACKAGE_NAME"
          package_dir="package/$package_name"
          mkdir -p "$package_dir/config" "$package_dir/dacapo" dist
          cp target/release/MihoyoBBSToolsRS "$package_dir/"
          cp docs/使用说明.md "$package_dir/使用说明.md"
          cp docs/快速开始.md "$package_dir/快速开始.md"
          cp config/config.example.yaml "$package_dir/config/"
          cp integrations/dacapo/template.yml "$package_dir/dacapo/"
          tar -C package -czf "dist/$package_name.tar.gz" "$package_name"
          binary_bytes=$(stat -c %s "target/release/MihoyoBBSToolsRS")
          archive_bytes=$(stat -c %s "dist/$package_name.tar.gz")
          {
            echo "### Linux x86_64 体积"
            echo "| 文件 | 字节数 |"
            echo "|---|---:|"
            echo "| MihoyoBBSToolsRS | $binary_bytes |"
            echo "| $package_name.tar.gz | $archive_bytes |"
          } >> "$GITHUB_STEP_SUMMARY"
          cd dist
          sha256sum "$package_name.tar.gz" > "$package_name.tar.gz.sha256"

      - name: 上传 Linux 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.package_name }}
          path: dist/*
          if-no-files-found: error

  build-windows:
    name: 构建 Windows x86_64
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 确定构建版本
        id: version
        shell: pwsh
        env:
          RAW_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          $rawVersion = $env:RAW_VERSION
          $version = if ($rawVersion.StartsWith('v')) { $rawVersion.Substring(1) } else { $rawVersion }
          if ($version -notmatch '^[0-9A-Za-z][0-9A-Za-z._-]*$') {
            throw '版本号只能包含字母、数字、点、下划线和连字符'
          }
          "MIHOYO_BBS_TOOLS_VERSION=$version" | Add-Content -Path $env:GITHUB_ENV
          "PACKAGE_NAME=MihoyoBBSToolsRS-$version-windows-x86_64" | Add-Content -Path $env:GITHUB_ENV
          "package_name=MihoyoBBSToolsRS-$version-windows-x86_64" | Add-Content -Path $env:GITHUB_OUTPUT
          "tag=v$version" | Add-Content -Path $env:GITHUB_OUTPUT

      - name: 检出手动指定的版本标签
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          $refspec = "refs/tags/{0}:refs/tags/{0}" -f $env:TAG
          git fetch --force origin $refspec
          git checkout --detach $env:TAG

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: 编译 Release
        run: cargo build --release --locked

      - name: 打包并生成校验文件
        shell: pwsh
        run: |
          $packageName = $env:PACKAGE_NAME
          $packageDir = Join-Path package $packageName
          New-Item -ItemType Directory -Path (Join-Path $packageDir config) -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageDir dacapo) -Force | Out-Null
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -LiteralPath target/release/MihoyoBBSToolsRS.exe -Destination $packageDir
          Copy-Item -LiteralPath docs/使用说明.md -Destination (Join-Path $packageDir 使用说明.md)
          Copy-Item -LiteralPath docs/快速开始.md -Destination (Join-Path $packageDir 快速开始.md)
          Copy-Item -LiteralPath config/config.example.yaml -Destination (Join-Path $packageDir config)
          Copy-Item -LiteralPath integrations/dacapo/template.yml -Destination (Join-Path $packageDir dacapo)
          $archive = "dist/$packageName.zip"
          Compress-Archive -LiteralPath $packageDir -DestinationPath $archive
          $binaryBytes = (Get-Item -LiteralPath target/release/MihoyoBBSToolsRS.exe).Length
          $archiveBytes = (Get-Item -LiteralPath $archive).Length
          @"
          ### Windows x86_64 体积
          | 文件 | 字节数 |
          |---|---:|
          | MihoyoBBSToolsRS.exe | $binaryBytes |
          | $packageName.zip | $archiveBytes |
          "@ | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive).Hash.ToLowerInvariant()
          "$hash  $packageName.zip" | Set-Content -Encoding ascii "$archive.sha256"

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.package_name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: 创建 GitHub Release
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 发布标签产物
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.build-linux.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/*)

          if (( ${#assets[@]} == 0 )); then
            echo "dist 中没有可发布文件" >&2
            exit 1
          fi

          if ! gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GH_REPO" \
              --verify-tag \
              --generate-notes \
              --title "MihoyoBBSTools RS $TAG"
          fi

          gh release upload "$TAG" "${assets[@]}" \
            --repo "$GH_REPO" \
            --clobber
