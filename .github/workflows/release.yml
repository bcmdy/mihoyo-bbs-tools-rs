name: 发布

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 要构建和发布的已有版本标签
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-linux:
    name: 构建 Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: 生成首次依赖锁文件
        if: ${{ hashFiles('Cargo.lock') == '' }}
        run: cargo generate-lockfile

      - name: 编译 Release
        run: cargo build --release --locked

      - name: 打包并生成校验文件
        run: |
          set -euo pipefail
          package_name="mihoyo-bbs-tools-linux-x86_64"
          package_dir="package/$package_name"
          mkdir -p "$package_dir/config" dist
          cp target/release/mihoyo-bbs-tools "$package_dir/"
          cp docs/使用说明.md "$package_dir/使用说明.md"
          cp config/config.example.yaml "$package_dir/config/"
          tar -C package -czf "dist/$package_name.tar.gz" "$package_name"
          cd dist
          sha256sum "$package_name.tar.gz" > "$package_name.tar.gz.sha256"

      - name: 上传 Linux 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: mihoyo-bbs-tools-linux-x86_64
          path: dist/*
          if-no-files-found: error

  build-windows:
    name: 构建 Windows x86_64
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: 生成首次依赖锁文件
        if: ${{ hashFiles('Cargo.lock') == '' }}
        run: cargo generate-lockfile

      - name: 编译 Release
        run: cargo build --release --locked

      - name: 打包并生成校验文件
        shell: pwsh
        run: |
          $packageName = "mihoyo-bbs-tools-windows-x86_64"
          $packageDir = Join-Path package $packageName
          New-Item -ItemType Directory -Path (Join-Path $packageDir config) -Force | Out-Null
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -LiteralPath target/release/mihoyo-bbs-tools.exe -Destination $packageDir
          Copy-Item -LiteralPath docs/使用说明.md -Destination (Join-Path $packageDir 使用说明.md)
          Copy-Item -LiteralPath config/config.example.yaml -Destination (Join-Path $packageDir config)
          $archive = "dist/$packageName.zip"
          Compress-Archive -LiteralPath $packageDir -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive).Hash.ToLowerInvariant()
          "$hash  $packageName.zip" | Set-Content -Encoding ascii "$archive.sha256"

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: mihoyo-bbs-tools-windows-x86_64
          path: dist/*
          if-no-files-found: error

  publish:
    name: 创建 GitHub Release
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 发布标签产物
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/*)

          if (( ${#assets[@]} == 0 )); then
            echo "dist 中没有可发布文件" >&2
            exit 1
          fi

          if ! gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GH_REPO" \
              --verify-tag \
              --generate-notes \
              --title "MihoyoBBSTools RS $TAG"
          fi

          gh release upload "$TAG" "${assets[@]}" \
            --repo "$GH_REPO" \
            --clobber
