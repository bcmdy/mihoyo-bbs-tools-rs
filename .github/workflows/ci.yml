name: Rust CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 构建版本号，例如 1.0.1（可不含 v）
        required: true
        type: string
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "rust-toolchain.toml"
      - ".cargo/**"
      - "tests/**"
      - ".github/workflows/**"
      - "config/config.example.yaml"
      - "integrations/**"
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/**"
      - "README.md"
      - "docs/**"
      - "flake.nix"
      - "flake.lock"
  pull_request:
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "rust-toolchain.toml"
      - ".cargo/**"
      - "tests/**"
      - ".github/workflows/**"
      - "config/config.example.yaml"
      - "integrations/**"
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/**"
      - "README.md"
      - "docs/**"
      - "flake.nix"
      - "flake.lock"

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: 格式、静态检查与测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 确定构建版本
        shell: bash
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          raw_version="$RAW_VERSION"
          if [[ -z "$raw_version" ]]; then
            raw_version="ci-${GITHUB_RUN_NUMBER}"
          fi
          version="${raw_version#v}"
          if [[ ! "$version" =~ ^[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "版本号只能包含字母、数字、点、下划线和连字符" >&2
            exit 1
          fi
          echo "MIHOYO_BBS_TOOLS_VERSION=$version" >> "$GITHUB_ENV"

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: 检查格式
        run: cargo fmt --all -- --check

      - name: 检查 TLS 依赖
        shell: bash
        run: |
          tree=$(cargo tree --locked -e normal)
          if grep -qE 'aws-lc-(rs|sys)' <<< "$tree"; then
            echo "正常依赖中仍包含 AWS-LC" >&2
            exit 1
          fi
          grep -q 'ring v' <<< "$tree"

      - name: Clippy 静态检查
        run: |
          set +e
          cargo clippy --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            details=$(tail -n 80 clippy.log)
            details="${details//'%'/'%25'}"
            details="${details//$'\r'/'%0D'}"
            details="${details//$'\n'/'%0A'}"
            echo "::error title=Clippy 失败::$details"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 clippy.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$code"

      - name: 执行测试
        run: cargo test --all-features --locked

  build:
    name: 编译 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      GIT_COMMIT: ${{ github.sha }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 确定 Linux 构建版本
        id: version_linux
        if: runner.os == 'Linux'
        shell: bash
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          raw_version="$RAW_VERSION"
          if [[ -z "$raw_version" ]]; then
            raw_version="ci-${GITHUB_RUN_NUMBER}"
          fi
          version="${raw_version#v}"
          if [[ ! "$version" =~ ^[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "版本号只能包含字母、数字、点、下划线和连字符" >&2
            exit 1
          fi
          echo "MIHOYO_BBS_TOOLS_VERSION=$version" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=MihoyoBBSToolsRS-$version-linux-x86_64" >> "$GITHUB_ENV"
          echo "package_name=MihoyoBBSToolsRS-$version-linux-x86_64" >> "$GITHUB_OUTPUT"

      - name: 确定 Windows 构建版本
        id: version_windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          $rawVersion = $env:RAW_VERSION
          if ([string]::IsNullOrWhiteSpace($rawVersion)) {
            $rawVersion = "ci-$env:GITHUB_RUN_NUMBER"
          }
          $version = if ($rawVersion.StartsWith('v')) { $rawVersion.Substring(1) } else { $rawVersion }
          if ($version -notmatch '^[0-9A-Za-z][0-9A-Za-z._-]*$') {
            throw '版本号只能包含字母、数字、点、下划线和连字符'
          }
          "MIHOYO_BBS_TOOLS_VERSION=$version" | Add-Content -Path $env:GITHUB_ENV
          "PACKAGE_NAME=MihoyoBBSToolsRS-$version-windows-x86_64" | Add-Content -Path $env:GITHUB_ENV
          "package_name=MihoyoBBSToolsRS-$version-windows-x86_64" | Add-Content -Path $env:GITHUB_OUTPUT

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: 编译 Release
        if: runner.os == 'Linux'
        run: |
          set +e
          cargo build --release --locked 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            details=$(tail -n 80 build.log)
            details="${details//'%'/'%25'}"
            details="${details//$'\r'/'%0D'}"
            details="${details//$'\n'/'%0A'}"
            echo "::error title=Linux 构建失败::$details"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 build.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$code"

      - name: 编译 Release
        if: runner.os == 'Windows'
        run: cargo build --release --locked

      - name: 打包 Linux 使用文件
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          package_name="$PACKAGE_NAME"
          package_dir="package/$package_name"
          mkdir -p "$package_dir/config" "$package_dir/dacapo" dist
          cp target/release/MihoyoBBSToolsRS "$package_dir/"
          cp docs/使用说明.md "$package_dir/使用说明.md"
          cp config/config.example.yaml "$package_dir/config/"
          cp integrations/dacapo/template.yml "$package_dir/dacapo/"
          tar -C package -czf "dist/$package_name.tar.gz" "$package_name"
          binary_bytes=$(stat -c %s "target/release/MihoyoBBSToolsRS")
          archive_bytes=$(stat -c %s "dist/$package_name.tar.gz")
          {
            echo "### Linux x86_64 体积"
            echo "| 文件 | 字节数 |"
            echo "|---|---:|"
            echo "| MihoyoBBSToolsRS | $binary_bytes |"
            echo "| $package_name.tar.gz | $archive_bytes |"
          } >> "$GITHUB_STEP_SUMMARY"
          cd dist
          sha256sum "$package_name.tar.gz" > "$package_name.tar.gz.sha256"

      - name: 打包 Windows 使用文件
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageName = $env:PACKAGE_NAME
          $packageDir = Join-Path package $packageName
          New-Item -ItemType Directory -Path (Join-Path $packageDir config) -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageDir dacapo) -Force | Out-Null
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -LiteralPath target/release/MihoyoBBSToolsRS.exe -Destination $packageDir
          Copy-Item -LiteralPath docs/使用说明.md -Destination (Join-Path $packageDir 使用说明.md)
          Copy-Item -LiteralPath config/config.example.yaml -Destination (Join-Path $packageDir config)
          Copy-Item -LiteralPath integrations/dacapo/template.yml -Destination (Join-Path $packageDir dacapo)
          $archive = "dist/$packageName.zip"
          Compress-Archive -LiteralPath $packageDir -DestinationPath $archive
          $binaryBytes = (Get-Item -LiteralPath target/release/MihoyoBBSToolsRS.exe).Length
          $archiveBytes = (Get-Item -LiteralPath $archive).Length
          @"
          ### Windows x86_64 体积
          | 文件 | 字节数 |
          |---|---:|
          | MihoyoBBSToolsRS.exe | $binaryBytes |
          | $packageName.zip | $archiveBytes |
          "@ | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive).Hash.ToLowerInvariant()
          "$hash  $packageName.zip" | Set-Content -Encoding ascii "$archive.sha256"

      - name: 上传完整使用包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version_linux.outputs.package_name || steps.version_windows.outputs.package_name }}
          path: dist/*
          if-no-files-found: error

  build-linux-arm:
    name: 编译 Linux ${{ matrix.package_arch }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            package_arch: arm64
            runs_on: ubuntu-24.04-arm
            cross_cc: ""
            cross_ar: ""
            apt_package: ""
          - target: armv7-unknown-linux-gnueabihf
            package_arch: armv7
            runs_on: ubuntu-latest
            cross_cc: arm-linux-gnueabihf-gcc
            cross_ar: arm-linux-gnueabihf-ar
            apt_package: gcc-arm-linux-gnueabihf libc6-dev-armhf-cross qemu-user
    env:
      GIT_COMMIT: ${{ github.sha }}
      CARGO_TARGET: ${{ matrix.target }}
      CROSS_CC: ${{ matrix.cross_cc }}
      CROSS_AR: ${{ matrix.cross_ar }}

    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 安装 Rust 与目标平台
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "$CARGO_TARGET"

      - name: 安装交叉编译器
        if: matrix.apt_package != ''
        env:
          APT_PACKAGE: ${{ matrix.apt_package }}
        run: |
          sudo apt-get update
          read -r -a packages <<< "$APT_PACKAGE"
          sudo apt-get install --yes --no-install-recommends "${packages[@]}"

      - name: 配置交叉编译器
        if: matrix.cross_cc != ''
        run: |
          cargo_key="${CARGO_TARGET^^}"
          cargo_key="${cargo_key//-/_}"
          cc_key="${CARGO_TARGET//-/_}"
          echo "CARGO_TARGET_${cargo_key}_LINKER=$CROSS_CC" >> "$GITHUB_ENV"
          echo "CC_${cc_key}=$CROSS_CC" >> "$GITHUB_ENV"
          echo "AR_${cc_key}=$CROSS_AR" >> "$GITHUB_ENV"

      - name: 编译 Release
        run: |
          set +e
          cargo build --release --locked --target "$CARGO_TARGET" 2>&1 | tee arm-build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            details=$(tail -n 100 arm-build.log)
            details="${details//'%'/'%25'}"
            details="${details//$'\r'/'%0D'}"
            details="${details//$'\n'/'%0A'}"
            echo "::error title=Linux ${{ matrix.package_arch }} 构建失败::$details"
          fi
          exit "$code"

      - name: 验证目标程序可启动
        shell: bash
        run: |
          binary="target/$CARGO_TARGET/release/MihoyoBBSToolsRS"
          if [[ "$CARGO_TARGET" == "armv7-unknown-linux-gnueabihf" ]]; then
            qemu-arm -L /usr/arm-linux-gnueabihf "$binary" version
          else
            "$binary" version
          fi
