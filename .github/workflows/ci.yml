name: Rust CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "rust-toolchain.toml"
      - ".cargo/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - "docs/使用说明.md"
      - "config/config.example.yaml"
  pull_request:
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "rust-toolchain.toml"
      - ".cargo/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - "docs/使用说明.md"
      - "config/config.example.yaml"

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: 格式、静态检查与测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: 生成首次依赖锁文件
        if: ${{ hashFiles('Cargo.lock') == '' }}
        run: cargo generate-lockfile

      - name: 检查格式
        run: cargo fmt --all -- --check

      - name: Clippy 静态检查
        run: |
          set +e
          cargo clippy --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 clippy.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$code"

      - name: 执行测试
        run: cargo test --all-features --locked

  build:
    name: 编译 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: 生成首次依赖锁文件
        if: ${{ hashFiles('Cargo.lock') == '' }}
        run: cargo generate-lockfile

      - name: 编译 Release
        if: runner.os == 'Linux'
        run: |
          set +e
          cargo build --release --locked 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 build.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$code"

      - name: 编译 Release
        if: runner.os == 'Windows'
        run: cargo build --release --locked

      - name: 打包 Linux 使用文件
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          package_name="mihoyo-bbs-tools-linux-x86_64"
          package_dir="package/$package_name"
          mkdir -p "$package_dir/config" dist
          cp target/release/mihoyo-bbs-tools "$package_dir/"
          cp docs/使用说明.md "$package_dir/使用说明.md"
          cp config/config.example.yaml "$package_dir/config/"
          tar -C package -czf "dist/$package_name.tar.gz" "$package_name"
          cd dist
          sha256sum "$package_name.tar.gz" > "$package_name.tar.gz.sha256"

      - name: 打包 Windows 使用文件
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageName = "mihoyo-bbs-tools-windows-x86_64"
          $packageDir = Join-Path package $packageName
          New-Item -ItemType Directory -Path (Join-Path $packageDir config) -Force | Out-Null
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -LiteralPath target/release/mihoyo-bbs-tools.exe -Destination $packageDir
          Copy-Item -LiteralPath docs/使用说明.md -Destination (Join-Path $packageDir 使用说明.md)
          Copy-Item -LiteralPath config/config.example.yaml -Destination (Join-Path $packageDir config)
          $archive = "dist/$packageName.zip"
          Compress-Archive -LiteralPath $packageDir -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive).Hash.ToLowerInvariant()
          "$hash  $packageName.zip" | Set-Content -Encoding ascii "$archive.sha256"

      - name: 上传完整使用包
        uses: actions/upload-artifact@v4
        with:
          name: mihoyo-bbs-tools-${{ runner.os }}-x86_64
          path: dist/*
          if-no-files-found: error
