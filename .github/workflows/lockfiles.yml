name: 生成依赖锁文件

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/lockfiles.yml"

permissions:
  contents: write

concurrency:
  group: dependency-lockfiles-main
  cancel-in-progress: false

jobs:
  generate:
    name: 生成 Cargo 与 Nix 锁文件
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: 更新 Cargo 锁文件
        run: cargo generate-lockfile

      - name: 安装 Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: 生成 Nix 锁文件
        run: nix flake lock

      - name: 上传锁文件
        uses: actions/upload-artifact@v4
        with:
          name: dependency-lockfiles-${{ github.run_number }}
          path: |
            Cargo.lock
            flake.lock
          if-no-files-found: error

      - name: 提交更新后的锁文件
        shell: bash
        run: |
          set -euo pipefail
          git add Cargo.lock flake.lock
          if git diff --cached --quiet; then
            echo "依赖锁文件无需更新"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit \
            -m "构建：更新依赖锁文件" \
            -m "由远程 Actions 生成 Cargo 与 Nix 锁文件，保持锁定依赖构建可复现。"
          git push origin HEAD:main
