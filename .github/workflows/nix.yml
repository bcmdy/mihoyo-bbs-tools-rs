name: Nix 构建

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "flake.nix"
      - "flake.lock"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "config/config.example.yaml"
      - "integrations/**"
      - "docs/**"
      - ".github/workflows/nix.yml"
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "config/config.example.yaml"
      - "integrations/**"
      - "docs/**"
      - ".github/workflows/nix.yml"

permissions:
  contents: read

concurrency:
  group: nix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: 检查 ${{ matrix.system }} 包
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runs_on: ubuntu-latest
          - system: aarch64-linux
            runs_on: ubuntu-24.04-arm
    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 安装 Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: 检查锁文件与构建包
        run: nix flake check --print-build-logs --no-write-lock-file
