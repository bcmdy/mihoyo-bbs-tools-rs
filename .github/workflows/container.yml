name: 多架构容器镜像

on:
  workflow_dispatch:
    inputs:
      version:
        description: 镜像版本号，例如 1.0.1（可不含 v）；留空时使用运行编号
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "config/config.example.yaml"
      - "integrations/**"
      - ".github/workflows/container.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "config/config.example.yaml"
      - "integrations/**"
      - ".github/workflows/container.yml"

permissions:
  contents: read

concurrency:
  group: container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 构建 amd64、arm64 与 arm/v7
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 确定镜像版本与标签
        id: image
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA:0:12}"
          tags=()

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            tags+=("$image:$version" "$image:$GITHUB_REF_NAME")
            if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              tags+=("$image:latest")
            fi
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            version="${INPUT_VERSION#v}"
            if [[ -z "$version" ]]; then
              version="manual-$GITHUB_RUN_NUMBER"
            fi
            tags+=("$image:$version")
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            version="pr-$PR_NUMBER"
            tags+=("$image:$version")
          else
            version="main-$GITHUB_RUN_NUMBER"
            tags+=("$image:main" "$image:sha-$short_sha")
          fi

          if [[ ! "$version" =~ ^[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "版本号只能包含字母、数字、点、下划线和连字符" >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 安装 QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: 安装 Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: 登录 GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并按需推送镜像
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
          build-args: |
            MIHOYO_BBS_TOOLS_VERSION=${{ steps.image.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=multiarch-container
          cache-to: type=gha,mode=max,scope=multiarch-container
          provenance: true
          sbom: true

      - name: 验证镜像清单与各架构程序
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          IMAGE_TAGS: ${{ steps.image.outputs.tags }}
        run: |
          set -euo pipefail
          image_ref="${IMAGE_TAGS%%$'\n'*}"
          docker buildx imagetools inspect "$image_ref"
          for platform in linux/amd64 linux/arm64 linux/arm/v7; do
            docker run --rm --platform "$platform" "$image_ref" version
          done
