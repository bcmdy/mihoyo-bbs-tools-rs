name: TLS 真实握手测试

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/size-optimization"
    paths:
      - ".github/workflows/tls-smoke.yml"
      - "tests/tls_smoke.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/http/**"
      - "src/push/smtp.rs"

permissions:
  contents: read

jobs:
  tls:
    name: ring TLS ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: 执行 HTTPS 握手测试
        run: cargo test --locked --test tls_smoke -- --ignored --nocapture
