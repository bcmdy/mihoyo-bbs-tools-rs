name: TLS 真实握手测试

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/size-optimization"
    paths:
      - ".github/workflows/tls-smoke.yml"
      - "tests/tls_smoke.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/http/**"
      - "src/push/smtp.rs"

permissions:
  contents: read

jobs:
  tls:
    name: ring TLS ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: 执行 HTTPS 握手测试
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set +e
          cargo test --locked --test tls_smoke -- --ignored --nocapture 2>&1 | tee tls-smoke.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            details=$(tail -n 80 tls-smoke.log)
            details="${details//'%'/'%25'}"
            details="${details//$'\r'/'%0D'}"
            details="${details//$'\n'/'%0A'}"
            echo "::error title=Linux TLS 握手失败::$details"
          fi
          exit "$code"

      - name: 执行 HTTPS 握手测试
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo test --locked --test tls_smoke -- --ignored --nocapture 2>&1 |
            Tee-Object -FilePath tls-smoke.log
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            $details = (Get-Content -LiteralPath tls-smoke.log -Tail 80) -join "`n"
            $details = $details.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=Windows TLS 握手失败::$details"
          }
          exit $code
